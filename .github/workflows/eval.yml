name: LLM Eval CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install deepeval pytest google-generativeai

    - name: Run Evaluations
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }} # Set this free key in GitHub Secrets
      run: |
        pytest tests/test_llm.py --json-report --json-report-file=report.json

    - name: Upload Metrics Artifact
      uses: actions/upload-artifact@v4
      with:
        name: eval-report
        path: report.json
